<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>unlisted | Showcase Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --brand-gradient: linear-gradient(135deg, #06B5D4 0%, #308DEF 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), url('Couple.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #1a1a1e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; 
        }

        .bg-gradient-layer {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(6, 181, 212, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(48, 141, 239, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .player-content, .outro-scene, .case-cover {
            will-change: transform, opacity;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .player-content, .outro-scene {
            opacity: 0;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .case-cover {
            transition: all 1.0s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 50;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }

        /* [추가] 버튼 호버 및 클릭 인터랙션 */
        .btn-interaction {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        /* 마우스 올렸을 때: 살짝 커지고 광택 강조 */
        .btn-interaction:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(6, 181, 212, 0.4);
        }
        /* 클릭하는 순간: 살짝 눌리는 효과 */
        .btn-interaction:active {
            transform: scale(0.95);
            filter: brightness(0.9);
        }

        .player-group.active-player .case-cover {
            transform: scale(0.9) translateY(-100px);
            opacity: 0;
            pointer-events: none;
        }

        .player-group.active-player .player-content:not(.hidden-scene) {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .outro-scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 60;
            text-align: center;
        }

        .outro-scene.active { opacity: 1; pointer-events: auto; }

        .outro-text {
            font-size: 1.2rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 2rem;
            color: white;
        }

        .outro-logo { height: 40px; opacity: 0.8; }
        .hidden-scene { opacity: 0 !important; pointer-events: none !important; }

        .video-mask {
            mask-image: radial-gradient(circle, white 100%, black 100%);
            -webkit-mask-image: -webkit-radial-gradient(circle, white 100%, black 100%);
        }

        .lyrics-window {
            height: 100px; 
            width: 90vw;
            max-width: 800px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lyric-line {
            position: absolute;
            width: 100%;
            text-align: center;
            transition: all 0.4s ease;
            opacity: 0;
            white-space: nowrap;
        }

        .lyric-line.current {
            opacity: 1;
            transform: translateY(-25px);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .lyric-line.next {
            opacity: 0.35;
            transform: translateY(15px); 
            color: #d1d1d6;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* PC 화면(1024px 이상) 확대 및 중앙 정렬 유지 */
        @media (min-width: 1024px) {
            body {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #main-group {
                transform: scale(1.5);
                transform-origin: center center; 
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100vh;
            }

            .lyrics-window {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-gradient-layer"></div>
    <audio id="bg-audio" src="Pit_a_Pat.mp3" preload="auto"></audio>

    <div id="main-group" class="player-group relative w-full max-w-5xl h-screen flex flex-col items-center justify-center cursor-pointer px-4 overflow-hidden">
        
        <div id="cover-ui" class="case-cover absolute w-[90%] max-w-[380px] min-h-[380px] px-8 py-10 flex flex-col justify-start gap-6 items-center shadow-[0_40px_80px_rgba(0,0,0,0.8)]">
            <div class="w-full flex flex-col items-center text-center z-10">
                <span class="text-[9px] font-bold tracking-[0.3em] uppercase px-3 py-1.5 rounded-full border border-[#06B5D4]/40 text-[#06B5D4] bg-[#06B5D4]/10 mb-5">unlisted original</span>
                <h1 class="text-3xl font-black tracking-tighter text-white mb-1 uppercase leading-none">Pit.a.Pat</h1>
                <p class="text-zinc-400 text-[9px] font-medium tracking-widest mb-6 uppercase">Produced by unlisted</p>
                <div class="w-full relative px-2">
                    <img src="Group 1707483564.png" alt="Comment" class="w-full h-auto rounded-2xl border border-white/10 shadow-2xl opacity-90">
                </div>
            </div>
            <div class="btn-interaction relative z-10 rounded-full p-[1.5px] overflow-hidden shadow-lg mt-2">
                <span class="absolute inset-0 bg-gradient-to-r from-[#06B5D4] via-[#308DEF] to-[#06B5D4]"></span>
                <div class="relative px-6 py-2.5 bg-black rounded-full flex items-center gap-3">
                    <span class="font-bold text-[13px] tracking-wide text-[#06B5D4]">Create Your Song</span>
                </div>
            </div>
        </div>

        <div id="player-ui" class="player-content w-full flex flex-col items-center gap-6">
            <div class="flex justify-center">
                <span class="text-[9px] font-bold tracking-[0.3em] uppercase px-3 py-1.5 rounded-full border border-[#06B5D4]/30 text-[#06B5D4] bg-[#06B5D4]/5">unlisted original</span>
            </div>
            
            <div class="relative w-60 h-60 md:w-[400px] md:h-[400px] shrink-0">
                <div class="video-mask absolute inset-0 rounded-full overflow-hidden border-[8px] border-[#1e1e20] shadow-2xl bg-black">
                    <video id="bg-video" muted loop playsinline preload="auto" class="w-full h-full object-cover">
                        <source src="video6.mp4" type="video/mp4">
                    </video>
                    <div class="absolute inset-0 m-auto w-12 h-12 bg-[#0c0c0e] rounded-full border-[6px] border-[#1e1e20] z-20"></div>
                </div>
            </div>
            
            <div class="flex flex-col items-center space-y-4 text-center w-full">
                <div class="space-y-1">
                    <h2 class="text-3xl md:text-5xl font-black tracking-tighter text-white uppercase">Pit.a.Pat</h2>
                    <p class="text-[10px] font-medium tracking-[0.1em] text-zinc-500 uppercase">Original Track by unlisted</p>
                </div>
                <div id="lyrics-window" class="lyrics-window"></div>
            </div>
        </div>

        <div id="outro-scene" class="outro-scene">
            <div class="outro-text">Want to create music<br>just for you?</div>
            <img src="logo.png" alt="unlisted" class="outro-logo" onerror="this.src='https://via.placeholder.com/100x30/000000/FFFFFF?text=unlisted'">
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        const video = document.getElementById('bg-video');
        const lyricsWindow = document.getElementById('lyrics-window');
        const playerUI = document.getElementById('player-ui');
        const outroScene = document.getElementById('outro-scene');

        const lyricsData = [
            { time: 11, text: "You tap on my front porch step" },
            { time: 14, text: "Blue shoes and a sundress swing" },
            { time: 16.8, text: "You laugh and my ribcage jumps" },
            { time: 19.2, text: "Like it wants to learn to sing" },
            { time: 22, text: "Sun on your freckles," },
            { time: 24, text: "Coffee in your hand" },
            { time: 25.8, text: "You say “come on, Let’s go”" },
            { time: 28.8, text: "And I’m already gone again" },
            { time: 32.6, text: "Pitapat, Pitapat, My heart goes" },
            { time: 35, text: "Every time you get that close" },
            { time: 39, text: "Like a note I can’t hold back" }
        ];

        lyricsData.forEach((item, index) => {
            const p = document.createElement('p');
            p.id = `lyric-${index}`;
            const isFirst = index === 0;
            p.className = `lyric-line text-[13px] md:text-base ${isFirst ? 'next' : ''}`; 
            p.style.opacity = isFirst ? "0.35" : "0"; 
            p.innerText = item.text;
            lyricsWindow.appendChild(p);
        });

        let isStarted = false;
        let fadeOutStarted = false;

        document.getElementById('main-group').addEventListener('click', () => {
            if (!isStarted) {
                document.getElementById('main-group').classList.add('active-player');
                audio.play();
                setTimeout(() => { video.play(); }, 100);
                isStarted = true;
            }
        });

        function startFadeOut() {
            if (fadeOutStarted) return;
            fadeOutStarted = true;
            const fadeInterval = setInterval(() => {
                if (audio.volume > 0.02) { audio.volume -= 0.02; } 
                else {
                    audio.volume = 0;
                    clearInterval(fadeInterval);
                    switchToOutro();
                }
            }, 50); 
        }

        function switchToOutro() {
            audio.pause(); video.pause();
            playerUI.classList.add('hidden-scene');
            outroScene.classList.add('active');
        }

        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            if (currentTime >= 34.0 && !fadeOutStarted) startFadeOut();

            let currentIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) currentIndex = i;
            }

            if (currentIndex !== -1) {
                lyricsData.forEach((_, index) => {
                    const el = document.getElementById(`lyric-${index}`);
                    el.classList.remove('current', 'next');
                    el.style.opacity = "0"; 
                });

                const currentEl = document.getElementById(`lyric-${currentIndex}`);
                const nextEl = document.getElementById(`lyric-${currentIndex + 1}`);
                if (currentEl) {
                    currentEl.classList.add('current');
                    currentEl.style.opacity = "1";
                }
                if (nextEl) {
                    nextEl.classList.add('next');
                    nextEl.style.opacity = "0.35";
                }
            }
        });
    </script>
</body>
</html>
