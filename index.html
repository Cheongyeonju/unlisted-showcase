<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unlisted | Mobile Optimized (1080x1920)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --brand-gradient: linear-gradient(135deg, #06B5D4 0%, #308DEF 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            /* 배경 이미지 설정 */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), url('Couple.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #1a1a1e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* 모바일 세로 스크롤 허용 (필요시) */
            overflow-x: hidden;
        }

        .bg-gradient-layer {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(6, 181, 212, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(48, 141, 239, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .player-content, .outro-scene, .case-cover {
            will-change: transform, opacity;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .player-content, .outro-scene {
            opacity: 0;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 커버 디자인: 1080 해상도 대응을 위해 너비 상향 조정 */
        .case-cover {
            transition: all 1.0s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 50;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; /* 화면 너비의 90% */
            max-width: 450px; /* 최대 너비 제한 */
            border-radius: 60px;
        }

        .player-group.active-player .case-cover {
            transform: scale(1.05) translateY(-50px);
            opacity: 0;
            pointer-events: none;
        }

        .player-group.active-player .player-content:not(.hidden-scene) {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .outro-scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 60;
            text-align: center;
        }

        .outro-scene.active { opacity: 1; pointer-events: auto; }

        .outro-text {
            font-size: 1.8rem; /* 모바일 시인성 상향 */
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 3rem;
        }

        .video-mask {
            mask-image: radial-gradient(circle, white 100%, black 100%);
            -webkit-mask-image: -webkit-radial-gradient(circle, white 100%, black 100%);
        }

        /* 가사 창 크기 조정 */
        .lyrics-window {
            height: 160px; 
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lyric-line {
            position: absolute;
            width: 100%;
            text-align: center;
            transition: all 0.4s ease;
            opacity: 0;
            white-space: nowrap;
        }

        .lyric-line.current {
            opacity: 1;
            transform: translateY(-40px); 
            color: white;
            font-weight: 700;
            font-size: 1.5rem; /* 가사 크기 상향 */
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .lyric-line.next {
            opacity: 0.35;
            transform: translateY(10px); 
            color: #d1d1d6;
            font-weight: 500;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="bg-gradient-layer"></div>
    <audio id="bg-audio" src="Pit_a_Pat.mp3" preload="auto"></audio>

    <div id="main-group" class="player-group relative w-full max-w-[1080px] h-screen flex items-center justify-center cursor-pointer px-6">
        
        <div id="cover-ui" class="case-cover absolute py-16 px-10 flex flex-col justify-start gap-10 items-center shadow-[0_50px_100px_rgba(0,0,0,0.9)] overflow-hidden">
            <div class="w-full flex flex-col items-center text-center z-10">
                <span class="text-[12px] font-bold tracking-[0.4em] uppercase px-4 py-2 rounded-full border border-[#06B5D4]/40 text-[#06B5D4] bg-[#06B5D4]/10 mb-8">unlisted original</span>
                <h1 class="text-5xl font-black tracking-tighter text-white mb-2 uppercase leading-none">Pit.a.Pat</h1>
                <p class="text-zinc-400 text-[12px] font-medium tracking-widest mb-10 uppercase">Produced by unlisted</p>
                <div class="w-full relative px-2">
                    <img src="Group 1707483564.png" alt="Comment" class="w-full h-auto rounded-3xl border border-white/10 shadow-2xl opacity-90 transform rotate-[-0.5deg]">
                </div>
            </div>
            <div class="relative z-10 rounded-full p-[2px] overflow-hidden transition-all duration-500 hover:scale-110 shadow-xl mt-6">
                <span class="absolute inset-0 bg-gradient-to-r from-[#06B5D4] via-[#308DEF] to-[#06B5D4]"></span>
                <div class="relative px-10 py-4 bg-black rounded-full transition-all duration-300 flex items-center gap-3">
                    <span class="font-bold text-lg tracking-wide text-[#06B5D4]">Create Your Song</span>
                </div>
            </div>
        </div>

        <div id="player-ui" class="player-content w-full flex flex-col items-center">
            <div class="flex justify-center mb-8">
                <span class="text-[12px] font-bold tracking-[0.4em] uppercase px-4 py-2 rounded-full border border-[#06B5D4]/30 text-[#06B5D4] bg-[#06B5D4]/5">unlisted original</span>
            </div>
            
            <div class="relative w-[320px] h-[320px] sm:w-[500px] sm:h-[500px] shrink-0 mb-12">
                <div class="video-mask absolute inset-0 rounded-full overflow-hidden border-[12px] border-[#1e1e20] shadow-[0_0_80px_rgba(6,181,212,0.2)] bg-black">
                    <video id="bg-video" muted loop playsinline preload="auto" class="w-full h-full object-cover">
                        <source src="video6.mp4" type="video/mp4">
                    </video>
                    <div class="absolute inset-0 m-auto w-16 h-16 bg-[#0c0c0e] rounded-full border-[10px] border-[#1e1e20] z-20 shadow-inner"></div>
                </div>
            </div>
            
            <div class="flex flex-col items-center space-y-10 text-center w-full">
                <div class="space-y-2">
                    <h2 class="text-5xl md:text-7xl font-black tracking-tighter text-white uppercase">Pit.a.Pat</h2>
                    <p class="text-[14px] font-medium tracking-[0.2em] text-zinc-500 uppercase">Original Track by <span class="text-zinc-400">unlisted</span></p>
                </div>
                <div id="lyrics-window" class="lyrics-window"></div>
            </div>
        </div>

        <div id="outro-scene" class="outro-scene">
            <div class="outro-text">Want to create music<br>just for you?</div>
            <img src="logo.png" alt="unlisted" class="h-12 opacity-90" onerror="this.src='https://via.placeholder.com/150x45/000000/FFFFFF?text=unlisted'">
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        const video = document.getElementById('bg-video');
        const lyricsWindow = document.getElementById('lyrics-window');
        const playerUI = document.getElementById('player-ui');
        const outroScene = document.getElementById('outro-scene');

        const lyricsData = [
            { time: 11, text: "You tap on my front porch step" },
            { time: 14, text: "Blue shoes and a sundress swing" },
            { time: 16.8, text: "You laugh and my ribcage jumps" },
            { time: 19.2, text: "Like it wants to learn to sing" },
            { time: 22, text: "Sun on your freckles," },
            { time: 24, text: "Coffee in your hand" },
            { time: 25.8, text: "You say “come on, Let’s go”" },
            { time: 28.8, text: "And I’m already gone again" },
            { time: 32.6, text: "Pitapat, Pitapat, My heart goes" },
            { time: 35, text: "Every time you get that close" },
            { time: 39, text: "Like a note I can’t hold back" }
        ];

        lyricsData.forEach((item, index) => {
            const p = document.createElement('p');
            p.id = `lyric-${index}`;
            const isFirst = index === 0;
            p.className = `lyric-line ${isFirst ? 'next' : ''}`; 
            p.style.opacity = isFirst ? "0.35" : "0"; 
            p.innerText = item.text;
            lyricsWindow.appendChild(p);
        });

        let isStarted = false;
        let fadeOutStarted = false;

        document.getElementById('main-group').addEventListener('click', () => {
            if (!isStarted) {
                document.getElementById('main-group').classList.add('active-player');
                audio.play();
                setTimeout(() => { video.play(); }, 100);
                isStarted = true;
            }
        });

        function startFadeOut() {
            if (fadeOutStarted) return;
            fadeOutStarted = true;
            const fadeInterval = setInterval(() => {
                if (audio.volume > 0.02) { audio.volume -= 0.02; } 
                else {
                    audio.volume = 0;
                    clearInterval(fadeInterval);
                    switchToOutro();
                }
            }, 50); 
        }

        function switchToOutro() {
            audio.pause(); video.pause();
            playerUI.classList.add('hidden-scene');
            outroScene.classList.add('active');
        }

        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            if (currentTime >= 34.0 && !fadeOutStarted) startFadeOut();

            let currentIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) currentIndex = i;
            }

            if (currentIndex !== -1) {
                lyricsData.forEach((_, index) => {
                    const el = document.getElementById(`lyric-${index}`);
                    el.classList.remove('current', 'next');
                    el.style.opacity = "0"; 
                });

                const currentEl = document.getElementById(`lyric-${currentIndex}`);
                const nextEl = document.getElementById(`lyric-${currentIndex + 1}`);
                if (currentEl) {
                    currentEl.classList.add('current');
                    currentEl.style.opacity = "1";
                }
                if (nextEl) {
                    nextEl.classList.add('next');
                    nextEl.style.opacity = "0.35";
                }
            }
        });
    </script>
</body>
</html>
</body>
</html>
